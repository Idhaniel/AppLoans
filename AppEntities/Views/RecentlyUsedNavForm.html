<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        body {
            padding-top: 20px;
        }
    </style>
    <script>
        function closeHamburgerIfMobile() {
            self.top.closeHamburgerIfMobile();
        }
        function generateRecentlyUsed(recentlyUsed)
        {
            let recentlyuseddiv = document.getElementById("recentlyuseddiv");
            clearChildNodes(recentlyuseddiv);
            //debugger;
            let ids = Object.keys(recentlyUsed);
            for (let i = ids.length - 1; i >= 0; i--) {
                let id = ids[i];
                //let classname = classnames[i];
                let caption = recentlyUsed[id].caption;
                let _class = recentlyUsed[id].class;
                //let recentdiv = document.createElement('div');
                //recentdiv.setAttribute("class", 'recentdiv');
                let recentbutton = document.createElement('button');
                //recentbutton.innerText = caption;
                recentbutton.setAttribute("title", caption);
                recentbutton.setAttribute("class", 'recentbutton');

                let spanclass = _class.includes('fa-files-o') ? 'lighter-blue' : _class.includes('fa-gg') ? 'dark-blue' : 'light-blue';

                let iconspan = document.createElement('span');
                iconspan.setAttribute('class', spanclass);

                let italic = document.createElement('i');
                italic.setAttribute('class', _class);

                let textspan = document.createElement('span');
                textspan.setAttribute('class', 'recent-text');
                textspan.innerText = caption;

                iconspan.appendChild(italic);
                recentbutton.appendChild(iconspan);
                recentbutton.appendChild(textspan);

                //recentbutton.setAttribute("runnabletype", classname);
                //recentbutton.setAttribute('menuid', id);
                recentbutton.id = recentlyUsed[id].id;
                //recentdiv.appendChild(recentbutton);
                recentlyuseddiv.appendChild(recentbutton);
            }
        }
    </script>
</head>
<body>
    <div style="width: 100%; height: 100%;">
        <div id="recently-used-items">
            <div class="recently-used-items-btn" id="recentlyuseddiv">
                
            </div>
        </div>
    </div>
</body>
</html>
