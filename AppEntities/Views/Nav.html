        function searchMenu() {
            //debugger;
            let search = document.getElementById("search");
            searchstring = search.value;
            let navdiv = document.getElementById("nav");
            navdiv.innerHTML = '';
            populateMenu();

            if (searchstring) {
                uncollapseAll();
            }
            else {
                collapseAll();
            }
        }

        function uncollapseAll() {
            $("ul.collapse").removeClass("collapse").addClass("in");
            $("ul.in").css("height", "auto");
        }

        function collapseAll() {
            $("ul.in").removeClass("in").addClass("collapse");
            $("ul.collapse").css("height", "0px");
        }

        function populateMenu(menu) {
            //debugger;
            let menuul = document.getElementById("menu-ul");

            for (let x = 0; x < menu.length; x++) {
                let childMenuItem = menu[x];
                let subMenu = getMenuItem(childMenuItem, 1);
                menuul.appendChild(subMenu);

                //navdiv.appendChild(subdiv);
            }
        }
